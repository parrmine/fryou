<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Animation</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{
  display:block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
function heart(t){
  const x = 16 * Math.pow(Math.sin(t),3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return {x,y};
}

// Generate titik-titik bentuk hati
for(let t=0; t < Math.PI*2; t += 0.1){
  let pos = heart(t);
  particles.push({
    x: canvas.width/2,
    y: canvas.height/2,
    tx: canvas.width/2 + pos.x * 15,
    ty: canvas.height/2 + pos.y * 15,
    size: Math.random()*3 + 1
  });
}

let progress = 0;
function animate(){
  ctx.fillStyle = "rgba(0,0,0,0.2)"; // efek jejak
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  if(progress < 1) progress += 0.02;
  
  particles.forEach(p=>{
    const x = p.x + (p.tx-p.x)*progress;
    const y = p.y + (p.ty-p.y)*progress;
    ctx.beginPath();
    ctx.fillStyle = "#ff69b4";
    ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
